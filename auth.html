<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduBuddy - AI-Powered Learning Platform">
    <meta name="theme-color" content="#6366f1">
    
    <title>EduBuddy - AI-Powered Learning</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ==================== AUTH WRAPPER ==================== -->
<div class="auth-wrapper">

    <!-- ==================== HERO SECTION ==================== -->
    <div class="hero-section">
        
        <!-- Hero Image -->
        <img src="assets/hero.png" class="hero-img" alt="Learning Illustration">
        
        <!-- Floating Icons Animation -->
        <div class="floating-icons">
            <span title="Analytics">📈</span>
            <span title="Achievement">🏆</span>
            <span title="Streak">🔥</span>
            <span title="Intelligence">🧠</span>
        </div>

        <!-- Hero Title -->
        <h1>AI-Powered Learning</h1>
        
        <!-- Hero Description -->
        <p>
            Detect weak areas. Get personalized quizzes.<br>
            Stay consistent with streaks & gamification.
        </p>
    </div>

    <!-- ==================== AUTH CARD ==================== -->
    <div class="auth-card">

        <!-- Card Header -->
        <div class="auth-title">EduBuddy</div>
        <div class="auth-subtitle">Personalized & Gamified Learning Dashboard</div>

        <!-- Tab Navigation -->
        <div class="tab-group">
            <button id="loginTab" class="tab active" data-tab="login">Login</button>
            <button id="signupTab" class="tab" data-tab="signup">Sign Up</button>
        </div>

        <!-- ==================== LOGIN FORM ==================== -->
        <div id="loginForm">

            <!-- Email Input -->
            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    placeholder="your@email.com"
                    required
                >
            </div>

            <!-- Password Input -->
            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    placeholder="Enter your password"
                    required
                >
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button id="loginBtn" class="btn-primary">
                    Login to Your Account
                </button>
                <button id="googleBtn" class="btn-google" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>

        </div>

        <!-- ==================== SIGNUP FORM ==================== -->
        <div id="signupForm" class="hidden">

            <div class="input-group">
  <label>Full Name</label>
  <input type="text" placeholder="Your full name" id="signupName">
</div>

<div class="input-group">
  <label>Email Address</label>
  <input type="email" placeholder="your@email.com" id="signupEmail">
</div>

<div class="input-group">
  <label>Password</label>
  <input type="password" placeholder="Create a strong password" id="signupPassword">
</div>
            <!-- Phone Input -->
            <div class="input-group">
                <label for="signupPhone">Phone Number</label>
                <input 
                    type="tel" 
                    id="signupPhone" 
                    placeholder="+1 (555) 000-0000"
                >
            </div>

            <!-- Sign Up Button -->
            <button class="btn-primary" id="signupBtn">Sign Up</button>

        </div>

    </div>

</div>

<!-- ==================== THEME TOGGLE ==================== -->
<button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
    🌙 Dark
</button>

<!-- ==================== FIREBASE SDK ==================== -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ==================== FIREBASE CONFIG ==================== -->
<script src="js/firebase.js"></script>

<!-- ==================== THEME TOGGLE SCRIPT ==================== -->
<script>
  // Initialize theme toggle
  function initializeThemeToggle() {
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    
    // Apply saved theme
    if (savedTheme === 'light') {
      document.body.classList.add('light-mode');
      themeToggle.textContent = '☀️ Light';
    } else {
      document.body.classList.remove('light-mode');
      themeToggle.textContent = '🌙 Dark';
    }

    // Toggle handler
    themeToggle.addEventListener('click', (e) => {
      e.preventDefault();
      document.body.classList.toggle('light-mode');
      
      if (document.body.classList.contains('light-mode')) {
        localStorage.setItem('theme', 'light');
        themeToggle.textContent = '☀️ Light';
      } else {
        localStorage.setItem('theme', 'dark');
        themeToggle.textContent = '🌙 Dark';
      }
    });
  }

  // Tab switching
  function initializeTabs() {
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.classList.remove('hidden');
      signupForm.classList.add('hidden');
      // Scroll to top of form
      document.querySelector('.auth-card').scrollTop = 0;
    });

    signupTab.addEventListener('click', () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
      // Scroll to top of form
      document.querySelector('.auth-card').scrollTop = 0;
    });
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', () => {
    initializeThemeToggle();
    initializeTabs();
  });
</script>

<!-- ==================== AUTH SCRIPT ==================== -->
<script type="module" src="js/auth.js"></script>

</body>
</html>
